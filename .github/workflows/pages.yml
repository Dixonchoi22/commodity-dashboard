name: Deploy dashboard to GitHub Pages

on:
  # Auto-deploy on every push to main
  push:
    branches: [main]
    paths:
      - "public/reports/**"
      - ".github/workflows/pages.yml"
  # Manual run from the Actions tab
  workflow_dispatch:

# Required permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deployment at a time, but don't cancel a run mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # We deploy the already-generated HTML under public/reports/. Re-running
      # the Python build pipeline inside CI would need the Mintec / Destatis
      # source files (currently committed under data/) plus a Python+pdftotext
      # toolchain — keep the dev workflow local for now and just publish the
      # output here.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/reports

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
