te\": \"2027-05-25\", \"value\": 217.45}]}}, \"apple us\": {\"name\": \"Apple US\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": 0.5, \"yoy_pct\": 47.9, \"price\": \"$0.78/Lb\", \"paragraph\": \"The average weekly price of US Apple as of March 25 increased by 0.5% MOM and rose by 47.9% YOY to $0.78/Lb. Overall, sources cite market stability. US fresh apple exports in the first half of the 2025/26 marketing year (August-July) were up by 5% YOY and stood at an eight-year high for that period, according to the USDA, with almost half of total exports going to Mexico and Canada. However, current market sentiment suggests steady conditions with limited near-term demand growth prospects for the rest of 2026.\", \"as_of\": \"\"}, \"robusta coffee ice london\": {\"name\": \"Robusta Coffee ICE London\", \"category\": \"Softs\", \"mom_pct\": 3.4, \"yoy_pct\": -31.4, \"price\": \"$3,772.80/MT\", \"paragraph\": \"The average weekly spot price of ICE London Robusta futures as of March 25 increased by 3.4% MOM and decreased by 31.4% YOY to $3,772.80/MT. In London, robusta certified stocks were drawn down in March, falling by 90,800 bags to 682,200 bags, 6% lower YOY. Weather across Vietnam\\u2019s Central Highlands was seasonally dry in the last 10 days of March, with light showers in Dak Nong. Cumulative precipitation since the start of 2026 is 1% below normal in Dak Lak, 56% above normal in Dak Nong, 17% above normal in Lam Dong and 25% above normal in Gia Lai.\", \"as_of\": \"\"}, \"pear spain\": {\"name\": \"Pear Spain\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": 9.2, \"yoy_pct\": 4.4, \"price\": \"\\u20ac1,900/MT\", \"paragraph\": \"The average weekly price of Spanish Pear as of March 25 increased by 9.2% MOM and rose by 4.4% YOY to \\u20ac1,900/MT. Market sources report a challenging outlook for Spain\\u2019s pear market, as production volumes remain significantly below the average of recent years and storage challenges are reportedly negatively affecting fruit quality. In addition, Spain is struggling with tough competition from other European producers.\", \"as_of\": \"\"}, \"black pepper vietnam\": {\"name\": \"Black Pepper Vietnam\", \"category\": \"Herbs & Spices\", \"mom_pct\": -2.7, \"yoy_pct\": -12.0, \"price\": \"$6,425/MT\", \"paragraph\": \"The average weekly price of Vietnamese Black Pepper as of March 25 decreased by 2.7% MOM and declined by 12.0% YOY to $6,425/MT.\", \"as_of\": \"\"}, \"pear china\": {\"name\": \"Pear China\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": -1.2, \"yoy_pct\": 5.1, \"price\": \"CNY 6,610/MT\", \"paragraph\": \"The average weekly price of Chinese Pear as of March 25 decreased by 1.2% MOM and rose by 5.1% YOY to CNY 6,610/MT. The Chinese pear sector continues to struggle with oversupply, according to sources. However, the market is under pressure from rising input costs and a labor shortage. In addition, domestic consumption patterns tend to favor higher quality fruit, which has been negatively affected by adverse weather conditions.\", \"as_of\": \"\"}, \"vanilla madagascar\": {\"name\": \"Vanilla Madagascar\", \"category\": \"Herbs & Spices\", \"mom_pct\": 0.0, \"yoy_pct\": -37.8, \"price\": \"$28/kg\", \"paragraph\": \"The Expana Benchmark Prices (EBP) of vanilla from Madagascar, the world\\u2019s largest producer, were unchanged MOM in March, down 37.8% YOY, at $28/kg for industrial grade 1 extraction vanilla beans. Prices continue to be pressured by oversupply.\", \"as_of\": \"March\"}, \"pear argentina\": {\"name\": \"Pear Argentina\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": -26.2, \"yoy_pct\": 32.2, \"price\": \"ARS 1,366.67/kg\", \"paragraph\": \"The average weekly price of Argentinian Pear as of March 25 decreased by 26.2% MOM and rose by 32.2% YOY to ARS 1,366.67/kg. According to market players, Argentina\\u2019s 2026 pear season will see reduced production, as adverse weather conditions reduced crop yields. However, fruit quality is reportedly still good, and exports to Brazil, a key destination, are reportedly likely to benefit from reduced availability in Europe.\", \"as_of\": \"\"}, \"turmeric india\": {\"name\": \"Turmeric India\", \"category\": \"Herbs & Spices\", \"mom_pct\": -10.9, \"yoy_pct\": 0.0, \"price\": \"$153.74/100kg\", \"paragraph\": \"The average weekly price of Indian Turmeric as of March 25 decreased by 10.9% MOM and declined by 0.0% YOY to $153.74/100kg.\", \"as_of\": \"\"}, \"orange south africa\": {\"name\": \"Orange South Africa\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": -46.5, \"yoy_pct\": -32.2, \"price\": \"ZAR 9,091.59/MT\", \"paragraph\": \"The average weekly price of South African Orange as of March 25 decreased by 46.5% MOM and declined by 32.2% YOY to ZAR 9,091.59/MT. The Citrus Growers\\u2019 Association of Southern Africa (CGA) has released its initial export forecasts for 2026. Some orange varieties are expected to record declines in export volumes, while others, such as Valencia oranges, show slight increases. According to the CGA, the industry continues to face market access challenges, as well as logistical inefficiencies.\", \"as_of\": \"\"}, \"cumin india\": {\"name\": \"Cumin India\", \"category\": \"Herbs & Spices\", \"mom_pct\": -4.5, \"yoy_pct\": -12.6, \"price\": \"$256/100kg\", \"paragraph\": \"The average weekly price of Indian Cumin as of March 25 decreased by 4.5% MOM and declined by 12.6% YOY to $256/100kg.\", \"as_of\": \"\"}, \"banana eu\": {\"name\": \"Banana EU\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": 0.9, \"yoy_pct\": -0.1, \"price\": \"\\u20ac1,146.33/MT\", \"paragraph\": \"The average weekly price of EU Banana as of March 25 increased by 0.9% MOM and declined by 0.1% YOY to \\u20ac1,146.33/MT. Market sources say the banana market continues to demonstrate stability overall as Costa Rica\\u2019s banana production continues to produce consistent volumes. Still, some producers are expressing concern that tight margins have not kept up with growing labor and production costs. Meanwhile, FreshPlaza said the UK banana market experienced a decline in Belize banana imports in January, contradicting Belize's improved performance in other EU markets.\", \"as_of\": \"\"}, \"chilli india\": {\"name\": \"Chilli India\", \"category\": \"Herbs & Spices\", \"mom_pct\": -3.9, \"yoy_pct\": 68.1, \"price\": \"$245.20/100kg\", \"paragraph\": \"The average weekly price of Indian Chilli as of March 25 decreased by 3.9% MOM and rose by 68.1% YOY to $245.20/100kg.\", \"as_of\": \"\"}, \"banana us\": {\"name\": \"Banana US\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": -4.2, \"yoy_pct\": -18.0, \"price\": \"$0.51/Lb\", \"paragraph\": \"The average weekly price of US Banana as of March 25 decreased by 4.2% MOM and declined by 18.0% YOY to $0.51/Lb. US Banana prices slipped slightly amid solid supply from Costa Rica. Still, concerns around TR4, or Panama Disease, are front of mind as some South American crops are impacted. Meanwhile, banana exports to key UAE markets, such as Saudi Arabia, Oman, and Dubai, are largely paused due to the US-Isreal-Iran conflict, leaving supply available for alternative destinations.\", \"as_of\": \"\"}, \"peanuts argentina\": {\"name\": \"Peanuts Argentina\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": 0.8, \"yoy_pct\": -7.3, \"price\": \"$1,275/MT\", \"paragraph\": \"The average weekly price of Argentinian Peanuts as of March 25 increased by 0.8% MOM and declined by 7.3% YOY to $1,275/MT. Argentine peanut prices have largely stabilized following recent gains driven by new-crop drought stress. Relief rains across the growing region have eased near-term concerns, though yield potential has been reduced. With lower planted acreage and dry conditions, industry sources expect a smaller crop than the prior year, though production should still reach historically large levels. Harvest-season weather will likely influence pace and near-term pricing as the market transitions crop years. Freight and energy cost pressures continue to weigh on producers but have not yet materially impacted market prices.\", \"as_of\": \"\"}, \"onion india\": {\"name\": \"Onion India\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": -6.1, \"yoy_pct\": -28.1, \"price\": \"INR 19,516.10/MT\", \"paragraph\": \"The average weekly price of Indian Onion as of March 25 decreased by 6.1% MOM and declined by 28.1% YOY to INR 19,516.10/MT. Indian onion prices have declined as exporters struggle with a lack of market access to the Gulf, owing to the Middle East conflict. According to market reports, exports to the region have decreased by close to 45% YOY. Freight prices for Indian exporters have increased exponentially, and sales opportunities are reportedly being lost to regional competitors who are able to access the market by road.\", \"as_of\": \"\"}, \"almonds us\": {\"name\": \"Almonds US\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": -6.8, \"yoy_pct\": -8.1, \"price\": \"$2.74/Lb\", \"paragraph\": \"The average weekly price of US Almonds as of March 25 decreased by 6.8% MOM and declined by 8.1% YOY to $2.74/Lb. US almond prices declined early in March amid Middle East uncertainty, then stabilized and traded rangebound through month-end. Despite significant global and macroeconomic headwinds, demand has remained relatively resilient, though market participants are closely monitoring this dynamic. Attention will focus on late April/early May crop estimates for 2026/27, with industry observers expecting the outlook to influence current pricing as end-users factor future supply availability into coverage decisions for the remainder of the year.\", \"as_of\": \"\"}, \"tomato eu\": {\"name\": \"Tomato EU\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": 48.3, \"yoy_pct\": 42.0, \"price\": \"\\u20ac5,680/MT\", \"paragraph\": \"The average weekly price of EU Tomato as of March 25 increased by 48.3% MOM and rose by 42.0% YOY to \\u20ac5,680/MT. Spanish tomato prices have increased significantly on the back of a supply shortage in Spain as well as other key producers such as Italy and Morocco. Severe weather events hit production in January and February, and stocks, which were at above-average levels, have been depleted significantly. Market sources expect the situation to persist throughout April.\", \"as_of\": \"\"}, \"hazelnuts turkey\": {\"name\": \"Hazelnuts Turkey\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": -6.0, \"yoy_pct\": 37.5, \"price\": \"$1,203/100kg\", \"paragraph\": \"The Turkish hazelnut EBP (11/13 CFR EU) decreased by 6% MOM in March to $1,203/100kg, and rose by 37.5% YOY. Turkey's 2025/26 hazelnut crop fell 34% YOY to 518,000 MT, the lowest in recent years, due to spring frosts and summer droughts. The 2026/27 season crop outlook appears more promising, with projections exceeding 800,000 MT. Carryover inventory from the current 2025/26 campaign could exceed 100,000 MT due to slow demand.\", \"as_of\": \"March\"}, \"potato processing eu\": {\"name\": \"Potato processing EU\", \"category\": \"Fruit & Vegetables\", \"mom_pct\": 0.0, \"yoy_pct\": -73.9, \"price\": \"\\u20ac60/MT\", \"paragraph\": \"The average weekly price of EU Potato processing as of March 25 was unchanged MOM and declined by 73.9% YOY to \\u20ac60/MT. Market participants describe a gloomy outlook for the sector, as the disruption to Gulf shipping and the resultant increase in freight costs add to an already difficult season for the industry. Vessels have been unable to reach their intended destinations, with sources reporting that some shipments have been returned to Europe. This comes amid the persistent oversupply situation in Europe, where free-buy trade continues to be reported at extremely low levels.\", \"as_of\": \"March 25\"}, \"cashews vietnam\": {\"name\": \"Cashews Vietnam\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": 3.2, \"yoy_pct\": -1.2, \"price\": \"$3.21/lb\", \"paragraph\": \"The Vietnamese cashew nut EBP increased by 3.2% MOM in March to $3.21/lb, down 1.2% YOY. Despite some forward interest, majority of buying from Vietnam continues to be done for nearby positions due to uncertain market outlook. On the European spot market, demand for WW320 remained slow, several sources said. Larger-sized kernels, by contrast, were experiencing brisk demand.\", \"as_of\": \"March\"}, \"brazil nuts south america\": {\"name\": \"Brazil Nuts South America\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": -22.7, \"yoy_pct\": -41.4, \"price\": \"$5.5/lb\", \"paragraph\": \"The Brazil nut EBP decreased by 22.7% MOM in March to $5.5/lb, down 41.4% YOY. Prices have fallen YOY as new supply from South America enters the market.\", \"as_of\": \"March\"}, \"dried apricots turkey\": {\"name\": \"Dried Apricots Turkey\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": 0.0, \"yoy_pct\": 85.0, \"price\": \"$9,250/MT\", \"paragraph\": \"Turkish dried apricot prices were unchanged MOM in March at $9,250/MT, up 85% YOY. Offers are scarce as whole fruit quality from the 2024 harvest deteriorates. Turkey's dried apricot sector experienced a severe collapse in 2025/26, with the output plummeting 98.1% to just 2,000 MT (March INC data), due to April 2025 frosts. However, recent assessments offer some recovery prospects. Experts project recovery rates of 60\\u201380% of normal yields for the 2026 harvest. Trees have passed the flowering phase, and crop conditions remain favorable so far.\", \"as_of\": \"March\"}, \"sultanas turkey\": {\"name\": \"Sultanas Turkey\", \"category\": \"Nuts & Dried Fruit\", \"mom_pct\": -3.3, \"yoy_pct\": -16.0, \"price\": \"$2,647/MT\", \"paragraph\": \"The Turkish sultana EBP (CIF Northwest Europe) fell by 3.3% MOM in March, down 16% YOY, to $2,647/MT. According to a new March 2026 production forecast revision from the International Nut and Dried Fruit Council (INC), Turkey's dried fruit sector faced a historic setback in 2025/26, with sultana production collapsing 27% to 165,000 MT following a devastating 2025 April frost. The revised estimate represents a substantial downward revision from a previous forecast of 220,000 MT. In normal years, Turkey can produce in excess of 300,000 MT. Despite the production shortfall, prices have been easing, pressured by weak global demand.\", \"as_of\": \"March\"}, \"cotton us\": {\"name\": \"Cotton US\", \"category\": \"Textiles\", \"mom_pct\": 6.9, \"yoy_pct\": 3.2, \"price\": \"USc 67.59/Lb\", \"paragraph\": \"The average weekly price of US Cotton as of March 25 increased by 6.9% MOM and rose by 3.2% YOY to USc 67.59/Lb. Prices for cotton in the US rose in March due to concerns about severe drought in Texas and other key growing regions, which threatens the 2026 harvest and could lead to a reduction in planted acreage.\", \"as_of\": \"\"}, \"cotton india\": {\"name\": \"Cotton India\", \"category\": \"Textiles\", \"mom_pct\": 2.6, \"yoy_pct\": 3.8, \"price\": \"INR 156,772.34/MT\", \"paragraph\": \"The average weekly price of Indian Cotton as of March 25 increased by 2.6% MOM and rose by 3.8% YOY to INR 156,772.34/MT. Cotton prices in India rose in March driven by strong demand from spinning mills and traders against the backdrop of overall increases in global quotations. A significant impact was exerted by the weakening of the Indian rupee against the dollar, which made cotton imports more expensive and stimulated purchases on the domestic market.\", \"as_of\": \"\"}, \"kraftliner eu\": {\"name\": \"Kraftliner EU\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -2.2, \"price\": \"\\u20ac904.50/MT\", \"paragraph\": \"In March, the average price of EU Kraftliner was unchanged MOM and declined by 2.2% YOY to \\u20ac904.50/MT. Weak demand prevented suppliers from raising prices despite rising raw material costs for kraftliner production. Paper manufacturers in the EU faced a 2.2% MOM increase in NBSK pulp prices in March, but market sources were primarily concerned about hardwood pulp prices, which rose 39% MOM due to low supply. In the global market, suppliers redirected pulp to Asia where demand was higher. In Europe, strikes at Spanish facilities and storms in Spain and Portugal disrupted supply, particularly for hardwood pulp.\", \"as_of\": \"\"}, \"testliner eu\": {\"name\": \"Testliner EU\", \"category\": \"Packaging\", \"mom_pct\": 1.5, \"yoy_pct\": -8.2, \"price\": \"\\u20ac670/MT\", \"paragraph\": \"In March, the average price of EU Testliner increased by 1.5% MOM and declined by 8.2% YOY to \\u20ac670/MT. Demand for testliner was stronger than for kraftliner and suppliers managed to raise prices slightly. Waste paper prices did not change significantly, but energy costs, particularly natural gas, rose sharply, pushing prices higher.\", \"as_of\": \"March\"}, \"fluting eu\": {\"name\": \"Fluting EU\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -1.2, \"price\": \"\\u20ac837.50/MT\", \"paragraph\": \"In March, the average price of EU Fluting was unchanged MOM and declined by 1.2% YOY to \\u20ac837.50/MT. Prices remained stable as supply and demand were in balance. At the same time, some sources indicated that further price increases were being discussed with suppliers amid rising energy costs.\", \"as_of\": \"\"}, \"cartonboard gc2 coated eu\": {\"name\": \"Cartonboard GC2 Coated EU\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -6.6, \"price\": \"\\u20ac1,125/MT\", \"paragraph\": \"In March, the average price of EU Cartonboard GC2 was unchanged MOM and declined by 6.6% YOY to \\u20ac1,125/MT, the average price of EU Cartonboard GT2 was unchanged MOM and declined by 7.1% YOY to \\u20ac785/MT. Stabilization of cartonboard prices in March was explained by a balanced market, with moderate demand from food and consumer packaging manufacturers fully matching available supply volumes. Additionally, intense competition among European producers and excess capacity in the cartonboard segment continued to restrain price growth.\", \"as_of\": \"\"}, \"cartonboard gt2 coated eu\": {\"name\": \"Cartonboard GT2 Coated EU\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -7.1, \"price\": \"\\u20ac785/MT\", \"paragraph\": \"In March, the average price of EU Cartonboard GC2 was unchanged MOM and declined by 6.6% YOY to \\u20ac1,125/MT, the average price of EU Cartonboard GT2 was unchanged MOM and declined by 7.1% YOY to \\u20ac785/MT. Stabilization of cartonboard prices in March was explained by a balanced market, with moderate demand from food and consumer packaging manufacturers fully matching available supply volumes. Additionally, intense competition among European producers and excess capacity in the cartonboard segment continued to restrain price growth.\", \"as_of\": \"\"}, \"linerboard us\": {\"name\": \"Linerboard US\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -5.4, \"price\": \"$0.44/Lb\", \"paragraph\": \"In March, the average price of US Linerboard was unchanged MOM and declined by 5.4% YOY to $0.44/Lb. Kraftliner prices were steady in March despite the PCA price increase of $70/mt that took effect on March 1. Market contacts suggest buyer resistance has so far limited adoption of the announced increase, with transaction prices holding at prior levels.\", \"as_of\": \"\"}, \"testliner us\": {\"name\": \"Testliner US\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -5.1, \"price\": \"$0.37/Lb\", \"paragraph\": \"In March, the average price of US Testliner was unchanged MOM and declined by 5.1% YOY to $0.37/Lb. Testliner prices held flat in March as input costs such as OCC remained relatively stable during the month, offering some respite to producers after a period of upward pressure.\", \"as_of\": \"\"}, \"cartonboard sbb us\": {\"name\": \"Cartonboard SBB US\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": -2.3, \"price\": \"$0.63/Lb\", \"paragraph\": \"In March, the average price of US Cartonboard SBB was unchanged MOM and declined by 2.3% YOY to $0.63/Lb. Cartonboard pricing has now been flat since November, when the divergence that began in July came to a halt as volumes declined.\", \"as_of\": \"\"}, \"cartonboard fbb us\": {\"name\": \"Cartonboard FBB US\", \"category\": \"Packaging\", \"mom_pct\": 0.0, \"yoy_pct\": 3.0, \"price\": \"$0.69/Lb\", \"paragraph\": \"In March, the average price of US Cartonboard FBB was unchanged MOM and rose by 3.0% YOY to $0.69/Lb. Prices for FBB kraft were unchanged in March as the market continued to absorb producer price adjustments. Demand for non-recycled cartonboard remained soft according to market contacts.\", \"as_of\": \"\"}, \"steel cme us\": {\"name\": \"Steel CME US\", \"category\": \"Packaging\", \"mom_pct\": 6.8, \"yoy_pct\": 18.3, \"price\": \"$1,136.53/MT\", \"paragraph\": \"In March, the average 3-month (3m) futures price of US HRC steel CME increased by 6.8% MOM and rose by 18.3% YOY to $1,136.53/MT. The average price of EU steel HRC increased by 6.4% MOM and rose by 10.6% YOY to \\u20ac705/MT. Overall demand for steel remained weak, but against the backdrop of tariffs and the Carbon Border Adjustment Mechanism (CBAM), demand for steel produced in the US and EU continued to grow, allowing producers to raise prices. Iron ore and coke prices in China rose as consumers resumed purchases following the conclusion of Lunar New Year celebrations. Risks of reduced iron supply from Iran stimulated inventory accumulation. Steel scrap prices continued their steady rise.\", \"as_of\": \"March\"}, \"steel eu\": {\"name\": \"Steel EU\", \"category\": \"Packaging\", \"mom_pct\": 6.4, \"yoy_pct\": 10.6, \"price\": \"\\u20ac705/MT\", \"paragraph\": \"In March, the average 3-month (3m) futures price of US HRC steel CME increased by 6.8% MOM and rose by 18.3% YOY to $1,136.53/MT. The average price of EU steel HRC increased by 6.4% MOM and rose by 10.6% YOY to \\u20ac705/MT. Overall demand for steel remained weak, but against the backdrop of tariffs and the Carbon Border Adjustment Mechanism (CBAM), demand for steel produced in the US and EU continued to grow, allowing producers to raise prices. Iron ore and coke prices in China rose as consumers resumed purchases following the conclusion of Lunar New Year celebrations. Risks of reduced iron supply from Iran stimulated inventory accumulation. Steel scrap prices continued their steady rise.\", \"as_of\": \"\"}, \"aluminium lme\": {\"name\": \"Aluminium LME\", \"category\": \"Packaging\", \"mom_pct\": 8.1, \"yoy_pct\": 26.1, \"price\": \"$3,341.64/MT\", \"paragraph\": \"In March, the average 3m futures price of LME Aluminium increased by 8.1% MOM and rose by 26.1% YOY to $3,341.64/MT. Base metals prices on the London Metal Exchange (LME) declined in March against risks of consumption contraction. Only aluminium prices continued their rise, as military activity in the Middle East further reduced supply on a deficit market.\", \"as_of\": \"March\"}, \"hdpe eu\": {\"name\": \"HDPE EU\", \"category\": \"Packaging\", \"mom_pct\": 13.8, \"yoy_pct\": 5.2, \"price\": \"\\u20ac1,625.50/MT\", \"paragraph\": \"In March, the average price of EU HDPE increased by 13.8% MOM and rose by 5.2% YOY to \\u20ac1,625.50/MT. Prices moved upwards markedly throughout March due to growing supply issues caused by the war in the Middle East. Additionally, major price rises in the naphtha market added upward momentum to ethylene prices. Sentiment within the European plastics market is reportedly \\u2018firm\\u2019 according to market sources, who remain worried about the supply of feedstocks and the increase in production costs due to markedly higher crude oil prices.\", \"as_of\": \"March\"}, \"ldpe eu\": {\"name\": \"LDPE EU\", \"category\": \"Packaging\", \"mom_pct\": 11.7, \"yoy_pct\": 7.9, \"price\": \"\\u20ac2,106.75/MT\", \"paragraph\": \"In March, the average price of EU LDPE increased by 11.7% MOM and rose by 7.9% YOY to \\u20ac2,106.75/MT. Prices for all plastic products in Europe rose markedly throughout March, driven by major worries associated with the ongoing Middle East conflict. Demand for polyethylene improved marginally with the coming of the spring.\", \"as_of\": \"March\"}, \"hdpe us\": {\"name\": \"HDPE US\", \"category\": \"Packaging\", \"mom_pct\": 9.8, \"yoy_pct\": 10.3, \"price\": \"USc 67/Lb\", \"paragraph\": \"In March, the average price of US HDPE increased by 9.8% MOM and rose by 10.3% YOY to USc 67/Lb. Throughout March, plastic products prices in the US moved upwards in line with continued supply concerns attributable to the US-Iran War, and the associated shipping disruption. Like in Europe, several buyers reported fixing purchases at elevated levels to manage risk associated with the war and the potential for continued volatility in feedstock prices.\", \"as_of\": \"March\"}, \"ldpe us\": {\"name\": \"LDPE US\", \"category\": \"Packaging\", \"mom_pct\": 6.6, \"yoy_pct\": 9.2, \"price\": \"USc 104.25/Lb\", \"paragraph\": \"In March, the average price of US LDPE increased by 6.6% MOM and rose by 9.2% YOY to USc 104.25/Lb. Rising raw material prices have steadily driven up plastic prices. The sentiment for the US plastics market moves from \\u2018steady\\u2019 to \\u2018mildly firm\\u2019 due to the ongoing Middle East conflict, which is pushing global plastics prices higher.\", \"as_of\": \"March\"}, \"pet eu\": {\"name\": \"PET EU\", \"category\": \"Packaging\", \"mom_pct\": 20.4, \"yoy_pct\": -5.0, \"price\": \"\\u20ac1,063/MT\", \"paragraph\": \"In March, the average price of EU PET increased by 20.4% MOM and declined by 5.0% YOY to \\u20ac1,063/MT. In addition to significant rises in raw material prices in Europe, demand for polyethylene and PET improved marginally with the coming of spring.\", \"as_of\": \"March\"}, \"pet us\": {\"name\": \"PET US\", \"category\": \"Packaging\", \"mom_pct\": 8.1, \"yoy_pct\": 2.7, \"price\": \"USc 66.75/Lb\", \"paragraph\": \"In March, the average price of US PET increased by 8.1% MOM and rose by 2.7% YOY to USc 66.75/Lb. Paraxylene prices spiked throughout the month due to the impact of the US-Iran War, which pushed production costs upwards. Demand is also rising in advance of the peak season as producers prepare for increased PET production. Market sources noted a rise in demand ahead of the peak season for PET production in spring and summer.\", \"as_of\": \"March\"}, \"pp eu\": {\"name\": \"PP EU\", \"category\": \"Packaging\", \"mom_pct\": 11.9, \"yoy_pct\": -5.8, \"price\": \"\\u20ac1,430.50/MT\", \"paragraph\": \"In March, the average price of EU PP increased by 11.9% MOM and declined by 5.8% YOY to \\u20ac1,430.50/MT. Propylene prices rose notably throughout March, attributable to the ongoing Middle East conflict and a resulting tightened market. As a result, PP prices increased significantly, supporting global plastic price growth.\", \"as_of\": \"March\"}, \"pp us\": {\"name\": \"PP US\", \"category\": \"Packaging\", \"mom_pct\": 11.6, \"yoy_pct\": 0.7, \"price\": \"USc 74.75/Lb\", \"paragraph\": \"In March, the average price of US PP increased by 11.6% MOM and rose by 0.7% YOY to USc 74.75/Lb. Although the latest data on plastic production indicate a slight decline, industry sources believe that production volumes are likely to increase in response to rising demand, although growth in demand for PP is expected to be moderate.\", \"as_of\": \"March\"}};\n  const fcCtx = document.getElementById('forecastChart');\n  let fcChart;\n\n  function fmtPct(v) {\n    if (v === null || v === undefined) return '\u2014';\n    return (v > 0 ? '+' : '') + v.toFixed(1) + '%';\n  }\n  function tone(v) {\n    if (v === null || v === undefined) return 'text-dark-muted';\n    return v > 0.5 ? 'text-secondary-red' : (v < -0.5 ? 'text-accent-green' : 'text-dark-muted');\n  }\n\n  function openCommodityModal(slug) {\n    const d = DETAILS[slug];\n    if (!d) return;\n\n    document.getElementById('cm-title').textContent = d.name + ' \u2014 Market Commentary';\n\n    // Info strip: Category / Latest Price / MoM / YoY\n    document.getElementById('cm-info').innerHTML = `\n      <div>\n        <p class=\"text-xs uppercase tracking-wider text-dark-muted font-semibold\">Category<\/p>\n        <p class=\"text-base font-bold text-primary-blue mt-1\">${d.category || '\u2014'}<\/p>\n      <\/div>\n      <div>\n        <p class=\"text-xs uppercase tracking-wider text-dark-muted font-semibold\">Latest Price<\/p>\n        <p class=\"text-base font-bold text-primary-blue mt-1\">${d.price || '\u2014'}<\/p>\n      <\/div>\n      <div>\n        <p class=\"text-xs uppercase tracking-wider text-dark-muted font-semibold\">MoM<\/p>\n        <p class=\"text-base font-bold mt-1 ${tone(d.mom_pct)}\">${fmtPct(d.mom_pct)}<\/p>\n      <\/div>\n      <div>\n        <p class=\"text-xs uppercase tracking-wider text-dark-muted font-semibold\">YoY<\/p>\n        <p class=\"text-base font-bold mt-1 ${tone(d.yoy_pct)}\">${fmtPct(d.yoy_pct)}<\/p>\n      <\/div>`;\n\n    // Commentary paragraph (when available)\n    const cblock = document.getElementById('cm-commentary-block');\n    if (d.paragraph) {\n      document.getElementById('cm-paragraph').textContent = d.paragraph;\n      cblock.classList.remove('hidden');\n    } else {\n      document.getElementById('cm-paragraph').textContent =\n        'No narrative commentary was extracted from the PDF for this commodity \u2014 it appears in the summary table only.';\n      cblock.classList.remove('hidden');\n    }\n\n    // Forward curve chart (when a matching Mintec curve exists)\n    const fblock = document.getElementById('cm-forecast-block');\n    if (d.forecast) {\n      document.getElementById('cm-forecast-subtitle').textContent =\n        d.forecast.description + ' \u00b7 ' + (d.forecast.unit || '') + ' \u00b7 '\n        + d.forecast.points.length + ' daily points \u00b7 '\n        + d.forecast.start + ' \u2192 ' + d.forecast.end;\n      if (fcChart) fcChart.destroy();\n      fcChart = new Chart(fcCtx, {\n        type: 'line',\n        data: {\n          labels: d.forecast.points.map(p => p.date),\n          datasets: [{\n            label: d.forecast.description,\n            data: d.forecast.points.map(p => p.value),\n            borderColor: '#60A5FA',\n            backgroundColor: 'rgba(96,165,250,0.15)',\n            fill: true, tension: 0.2, pointRadius: 0, borderWidth: 2\n          }]\n        },\n        options: {\n          responsive: true, maintainAspectRatio: false,\n          plugins: { legend: { labels: { color: '#94A3B8' } } },\n          scales: {\n            x: { ticks: { color: '#94A3B8', maxTicksLimit: 12 }, grid: { color: '#334155' } },\n            y: { ticks: { color: '#94A3B8' }, grid: { color: '#334155' } }\n          }\n        }\n      });\n      fblock.classList.remove('hidden');\n    } else {\n      fblock.classList.add('hidden');\n      if (fcChart) { fcChart.destroy(); fcChart = null; }\n    }\n\n    document.getElementById('commodity-modal').classList.add('open');\n  }\n  function closeCommodity() {\n    document.getElementById('commodity-modal').classList.remove('open');\n  }\n  window.closeCommodity = closeCommodity;\n\n  // Wire every commodity row to open the detail modal on click.\n  document.querySelectorAll('#commodity-body tr').forEach(tr => {\n    const slug = tr.dataset.name;\n    const d = DETAILS[slug];\n    if (!d) return;\n    tr.classList.add('cursor-pointer');\n    tr.title = 'Click for full market commentary';\n    tr.addEventListener('click', () => openCommodityModal(slug));\n    // Add a chart glyph if a forward curve is available for this row\n    if (d.forecast) {\n      const cell = tr.children[1];\n      cell.insertAdjacentHTML('beforeend', ' <i data-lucide=\"line-chart\" class=\"w-4 h-4 ml-1 inline text-accent-green\"><\/i>');\n    }\n  });\n\n  // ESC key closes the modal\n  document.addEventListener('keydown', e => {\n    if (e.key === 'Escape') closeCommodity();\n  });\n\n  // --- Explorer filter ---\n  const search = document.getElementById('search');\n  const catSel = document.getElementById('category-filter');\n  function applyFilter() {\n    const q = search.value.toLowerCase();\n    const cat = catSel.value;\n    document.querySelectorAll('#commodity-body tr').forEach(tr => {\n      const name = tr.dataset.name, c = tr.dataset.category;\n      const hit = (!q || name.includes(q)) && (!cat || c === cat);\n      tr.style.display = hit ? '' : 'none';\n    });\n  }\n  search.addEventListener('input', applyFilter);\n  catSel.addEventListener('change', applyFilter);\n\n  // Category card click \u2192 filter the table by that category\n  window.showCategory = function(cat) {\n    catSel.value = cat; applyFilter();\n    document.getElementById('explorer-section').scrollIntoView({ behavior:'smooth' });\n  };\n\n  // --- Sort ---\n  let sortState = { key: null, dir: 1 };\n  document.querySelectorAll('th[data-sort]').forEach(th => {\n    th.addEventListener('click', () => {\n      const key = th.dataset.sort;\n      if (sortState.key === key) sortState.dir = -sortState.dir; else { sortState.key = key; sortState.dir = 1; }\n      const body = document.getElementById('commodity-body');\n      const rows = Array.from(body.querySelectorAll('tr'));\n      rows.sort((a, b) => {\n        const av = valueFor(a, key), bv = valueFor(b, key);\n        if (av === bv) return 0;\n        if (av === null) return 1;\n        if (bv === null) return -1;\n        return av > bv ? sortState.dir : -sortState.dir;\n      });\n      rows.forEach(r => body.appendChild(r));\n    });\n  });\n  function valueFor(tr, key) {\n    if (key === 'name') return tr.dataset.name;\n    // Columns: 0 Category, 1 Commodity, 2 Price, 3 MoM, 4 YoY\n    const col = key === 'mom' ? 3 : 4;\n    const txt = tr.children[col].innerText.trim().replace('%','').replace('+','');\n    const n = parseFloat(txt);\n    return isNaN(n) ? null : n;\n  }\n\n  \n  // --- Germany trend chart (DE vs EU27) -- xt-primary-blue hover:text-white bg-dark-bg/50 rounded-lg hover:bg-primary-blue/80 transition duration-150 whitespace-nowrap border border-primary-blue/30\">Commodity Explorer<\/a>\n            <a href=\"#procurement-actions-card\" class=\"px-4 py-2 text-sm font-semibold text-primary-blue hover:text-white bg-dark-bg/50 rounded-lg hover:bg-primary-blue/80 transition duration-150 whitespace-nowrap border border-primary-blue/30\">Strategy<\/a>\n            <a href=\"#references-container\" class=\"px-4 py-2 text-sm font-semibold text-primary-blue hover:text-white bg-dark-bg/50 rounded-lg hover:bg-primary-blue/80 transition duration-150 whitespace-nowrap border border-primary-blue/30\">References<\/a>\n        <\/div>\n        <!-- END STATIC NAVIGATION BUTTONS -->\n\n        <!-- The two upload buttons were here and have been moved to the footer -->\n\n        <!-- Main Grid for KPIs and Charts -->\n        <div class=\"grid grid-cols-1 lg:grid-cols-3 gap-8\">\n\n            <!-- KPI Cards -->\n            <div id=\"kpi-grid\" class=\"lg:col-span-3 grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 chart-visible\">\n                <a id=\"kpi-section\" class=\"absolute -top-16\"><\/a> <!-- Anchor for 'Overview' -->\n                <!-- KPI 1: HICP Index -->\n                <div class=\"card text-center ring-2 ring-primary-blue/30 hover:shadow-xl-dark\">\n                    <p class=\"text-sm font-medium text-dark-muted uppercase\">HICP Food Index (Sep)<\/p>\n                    <p id=\"kpi-hicp-index\" class=\"text-4xl font-extrabold mt-1 text-primary-blue\">147.8<\/p>\n                    <p class=\"text-xs text-gray-400\">2015 = 100 Base<\/p>\n                <\/div>\n                <!-- KPI 2: Overall YoY Change -->\n                <div class=\"card text-center ring-2 ring-secondary-red/30 hover:shadow-xl-dark\">\n                    <p class=\"text-sm font-medium text-dark-muted uppercase\">YoY Overall Inflation<\/p>\n                    <p id=\"kpi-yoy-change\" class=\"text-4xl font-extrabold mt-1 text-secondary-red\">+3.0%<\/p>\n                    <p class=\"text-xs text-gray-400\">vs. Sep 2024 (HICP)<\/p>\n                <\/div>\n                <!-- KPI 3: MOVEMENT: HIGHEST MoM PRICE HIKE -->\n                <div class=\"card text-center ring-2 ring-secondary-red/30 hover:shadow-xl-dark\">\n                    <p class=\"text-sm font-medium text-dark-muted uppercase\">Highest MoM Price Hike<\/p>\n                    <p id=\"kpi-highest-mom\" class=\"text-lg font-bold mt-1 text-secondary-red\">Hazelnuts Turkey <span class=\"font-extrabold text-2xl\">(+34.3%)<\/span><\/p>\n                    <p class=\"text-xs text-gray-400\">Immediate Cost Pressure<\/p>\n                <\/div>\n                <!-- KPI 4: MoM Change (General) -->\n                <div class=\"card text-center ring-2 ring-accent-green/30 hover:shadow-xl-dark\">\n                    <p class=\"text-sm font-medium text-dark-muted uppercase\">MoM Overall Change<\/p>\n                    <p id=\"kpi-mom-change\" class=\"text-4xl font-extrabold mt-1 text-accent-green\">-0.2%<\/p>\n                    <p class=\"text-xs text-gray-400\">vs. Aug 2025 (HICP)<\/p>\n                <\/div>\n            <\/div>\n\n            <!-- Chart 1: HICP Line Chart (2/3 width on desktop) -->\n            <div id=\"hicp-chart-container\" class=\"lg:col-span-2 card chart-visible\">\n                <h2 class=\"text-2xl font-bold text-dark-text mb-1\">12-Month EU Food Index (HICP) Trend<\/h2>\n                <p id=\"hicp-chart-source\" class=\"text-xs text-dark-muted mb-4\">Source: <a href=\"https://ec.europa.eu/eurostat/databrowser/view/teicp010/default/table?lang=en\" target=\"_blank\" class=\"text-primary-blue hover:underline\">Eurostat HICP Food and Beverages, September 2025.<\/a><\/p>\n                <div class=\"h-80\">\n                    <canvas id=\"hicpChart\" style=\"box-sizing: border-box; display: block; height: 320px; width: 628px;\" width=\"942\" height=\"480\"><\/canvas>\n                <\/div>\n                \n                <!-- HICP CONTEXT: Integrated below the chart -->\n                <div class=\"mt-6 pt-4 border-t border-gray-700\">\n                    <h3 class=\"text-xl font-bold text-dark-text mb-2 flex items-center\">\n                        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" data-lucide=\"info\" class=\"lucide lucide-info w-5 h-5 text-primary-blue mr-2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\/circle><path d=\"M12 16v-4\"><\/path><path d=\"M12 8h.01\"><\/path><\/svg> Trend Analysis Summary\n                    <\/h3>\n                    <div class=\"text-gray-300 leading-relaxed text-sm border-l-4 border-primary-blue pl-3 py-1\">\n                        <p>The EU Food HICP experienced a minor month-on-month decline in September, dropping to 147.84. This deceleration from the August peak suggests a temporary easing of immediate consumer price pressure, despite the overall YoY inflation remaining persistent at +3.0% due to sustained elevated costs in the supply chain.<\/p>\n                    <\/div>\n                <\/div>\n            <\/div>\n\n            <!-- Summary Text (1/3 width on desktop) -->\n            <div id=\"summary-container\" class=\"lg:col-span-1 card flex flex-col justify-start chart-visible\">\n                <h2 class=\"text-2xl font-bold mb-4 text-dark-text flex items-center\">\n                    <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" data-lucide=\"bell\" class=\"lucide lucide-bell w-5 h-5 text-text-warning mr-2\"><path d=\"M10.268 21a2 2 0 0 0 3.464 0\"><\/path><path d=\"M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 rice of New Zealand Butter as of September 17 decreased by 1.1% M-O-M and rose by 5.3% Y-O-Y to $6,892/mt. Ample supply in combination with weak domestic and international demand continued a bearish market sentiment during September. Butter production increased, supported by strong milk availability during the month, according to market sources.\",\n        \"originalIndex\": 39\n    },\n    {\n        \"category\": \"Dairy & Eggs\",\n        \"name\": \"Butter US\",\n        \"mom\": -14.4,\n        \"yoy\": -32.7,\n        \"price\": \"$2.11/lb\",\n        \"proxy\": \"US\",\n        \"summary\": \"The average weekly price of US Butter as of September 24 decreased by 14.4% M-O-M and by 32.7% Y-O-Y to $2.11/lb. Elevated milk flows during the month further supported butter production to run at or near capacity. Export demand remained steady to strong with US products at a price discount to global trade partners.\",\n        \"originalIndex\": 40\n    },\n    {\n        \"category\": \"Dairy & Eggs\",\n        \"name\": \"Butter UK\",\n        \"mom\": -15,\n        \"yoy\": -26.6,\n        \"price\": \"\u00a35,100/mt\",\n        \"proxy\": \"UK\",\n        \"summary\": \"The average weekly price of UK Butter as of September 24 decreased by 15.0% M-O-M and declined by 26.6% Y-O-Y to \u00a35,100/mt. The bearish sentiment during September was supported by ample production in the EU, with buyers adopting a hand to mouth strategy due to prevailing bearish sentiment in the butter global markets. While buying interest declined, supply was reported as strong during the month with stable fresh production.\",\n        \"originalIndex\": 41\n    },\n    {\n        \"category\": \"Dairy & Eggs\",\n        \"name\": \"Gouda EU\",\n        \"mom\": -15.3,\n        \"yoy\": -30.5,\n        \"price\": \"\u20ac3,338/mt\",\n        \"proxy\": \"EU\",\n        \"summary\": \"The average weekly price of EU Gouda as of September 24, decreased by 15.3% M-O-M and declined by 30.5% Y-O-Y t eddar prices declined amid a strong bearish sentiment across the dairy commodities complex, driven by higher-than-expected milk output. Current UK prices are now more competitive than European levels, supporting export activity.\",\n        \"originalIndex\": 45\n    },\n    {\n        \"category\": \"Dairy & Eggs\",\n        \"name\": \"Egg EU\",\n        \"mom\": 3.2,\n        \"yoy\": 27,\n        \"price\": \"\u20ac2,647.90/mt\",\n        \"proxy\": \"EU\",\n        \"summary\": \"The average weekly price of EU Egg as of September 24 increased by 3.2% M-O-M and by 27.0% Y-O-Y to \u20ac2,647.90/mt. Retail demand across the EU rose significantly in September, spurred by seasonal shifts and evolving consumer habits. The return of urban populations after summer holidays and school reopening boosted household egg consumption and influenced food planning. Retail interest grew in core categories like cage and barn eggs, with strong momentum in free-range sales, especially in Western Europe. Despite rising prices and supply issues, demand remained resilient, driven by urgency and low price sensitivity.\",\n        \"originalIndex\": 46\n    },\n    {\n        \"category\": \"Dairy & Eggs\",\n        \"name\": \"Egg US\",\n        \"mom\": -27.7,\n        \"yoy\": -14.3,\n        \"price\": \"$1.92/dzn\",\n        \"proxy\": \"US\",\n        \"summary\": \"The average weekly price of US Egg as of September 24 decreased by 27.7% M-O-M and by 14.3% Y-O-Y to $1.92/dzn. After a period of stability, the US egg market softened through the back-half of September as expanding production outpaced seasonally average demand. Table-grade values declined steadily, first pressured by surplus cage-free supplies moving into conventional channels, and later by long availability that outstripped buyer interest. Loose and retail-ready packs slipped into discounted territory, while the backlog funnelled into processing channels, pushing breaking stock and egg products lower. Even with the first HPAI detection of the fall migration period, supplies remained more than adequate, leaving values across the complex at their lowest levels in over a year.\",\n        \"originalIndex\": 47\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Cod Norway*\",\n        \"mom\": -4.5,\n        \"yoy\": 21,\n        \"price\": \"NOK 45,186.40/mt\",\n        \"proxy\": \"Norway\",\n        \"summary\": \"In August, the average price of Norwegian Cod decreased by 4.5% M-O-M and rose by 21.0% Y-O-Y to NOK 45,186.40/mt Despite a significant reduction in accumulated landings of Atlantic cod in Norway through August, by 21.7% according to the Directorate of Fisheries, the market continues to show weakness after several months of firm prices. This shift in market sentiment may be related to the uncertainty generated by US tariffs.\",\n        \"originalIndex\": 48\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Haddock Norway*\",\n        \"mom\": 0.1,\n        \"yoy\": 70,\n        \"price\": \"NOK 23,956.13/mt\",\n        \"proxy\": \"Norway\",\n        \"summary\": \"In August, the average price of Norwegian Haddock increased by 0.1% M-O-M and by 70.0% Y-O-Y to NOK 23,956.13/mt. Norwegian haddock has continued to display market stability for two consecutive months. This change in market sentiment may be related to expectations of a better outcome for the 2026 quota, which is expected to be 18% higher than the current 2025 quota. By contrast, the y-o-y price increase may be explained by the significant reduction in accumulated landings through August of 16.3%, according to the Directorate of Fisheries.\",\n        \"originalIndex\": 49\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Alaska Pollock Russia\",\n        \"mom\": 1.3,\n        \"yoy\": 16.9,\n        \"price\": \"$3,264.32/mt\",\n        \"proxy\": \"Russia\",\n        \"summary\": \"The average weekly price of Russian Ala x\": 52\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Prawn Norway*\",\n        \"mom\": -35,\n        \"yoy\": 19.9,\n        \"price\": \"NOK 21,271.95/mt\",\n        \"proxy\": \"Norway\",\n        \"summary\": \"In August, the average price of Norwegian Prawn decreased by 35.0% M-O-M and rose by 19.9% Y-O-Y to NOK 21,271.95/mt. The raw coldwater shrimp market in Norway remained subdued during the summer, reflecting a notable seasonal decline in value. This typical price dip coincided with robust Chinese purchasing of orange head shrimp ahead of the Mid-Autumn Festival and Chinese New Year. Meanwhile, European market activity was slower during the holiday period. Despite the recent soft patch, Norwegian prawn values are up nearly 20% compared to last year, highlighting Norway's increasingly important role as a supplier to both China and Europe, especially since China imposed a 25% tariff on Canadian seafood in March.\",\n        \"originalIndex\": 53\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Asian Whiteleg Shrimp\",\n        \"mom\": 0,\n        \"yoy\": 15.6,\n        \"price\": \"$9.61/kg\",\n        \"proxy\": \"Shrimp\",\n        \"summary\": \"The average weekly price of Shrimp Asian Whiteleg as of September 24 was unchanged M-O-M and rose by 15.6% Y-O-Y to $9.61/kg. Modest price gains in June and July reflected tighter supply out of India, attributed to seasonal production factors, and robust demand from both the US and Europe during April and May. The spring harvest fell short of expectations due to severe rainfall that damaged shrimp ponds and reduced output. Throughout September, prices held steady as the Asian market maintained a relative balance between constrained supply and subdued global demand. Market participants anticipate increased activity in October, when traditionally, major buyers place larger orders in preparation for year-end deliveries.\",\n        \"originalIndex\": 54\n    },\n    {\n        \"category\": \"Fish & Seafood\",\n        \"name\": \"Tuna Thailand\",\n        \"mom\": 3.2,\n        \"yoy\": 14.3,\n        \"price\": \"$1,600/mt\",\n        \"proxy\": \"Thailand\",\n        \"summary\": \"In September, the average price of Thai Tuna increased by 3.2% M-O-M and by 14.3% Y-O-Y to $1,600/mt. The tuna market globally, particularly in Ecuador and Thailand, has become more active following the disclosure of the final tariff in the US market. Market participants report increased purchasing activity by the canning-tuna industry and insufficient landings of skipjack tuna, which has put upward pressure on prices.\",\n        \"originalIndex\": 55\n    },\n    {\n        \"category\": \"Fruit & Vegetables\",\n        \"name\": \"Apple China\",\n        \"mom\": 0.5,\n        \"yoy\": 3.5,\n        \"price\": \"$1.37/kg\",\n        \"proxy\": \"China\",\n        \"summary\": \"The average weekly price of Chinese Apple as of September 24 increased by 0.5% M-O-M and by 3.5% Y-O-Y to $1.37/kg. Chinese producers have also struggled with difficult weather this year, including frosts, hail and drought, which struck the major apple-producing province of Shaanxi. As a result, production for the 2025/26 season is expected to stand at 2 billion bushels, a 5% y-o-y drop, according to World Apple and Pear Association (WAPA) forecasts. This loss would account for a significant proportion of global supply, given China's level of output, which constituted 51% of global supply in 2023.\",\n        \"originalIndex\": 56\n    },\n    {\n        \"category\": \"Fruit & Vegetables\",\n        \"name\": \"Apple US\",\n        \"mom\": 5.8,\n        \"yoy\": 16.9,\n        \"price\": \"$0.76/lb\",\n        \"proxy\": \"US\",\n        \"summary\": \"The average weekly price of US Apple as of September 24 increased by 5.8% M-O-M and by 16.9% Y-O-Y to $0.76/lb. Total US apple production for the 2025/26 season is forecast at 278.5 million bushels, according to industry analysis. This is an increase of 1.3% y-o-y, and 3.6% above the five-year average. Industry sources suggest that US producers may be presented with an opportunity this year, given the significant crop losses for major producers T\u00fcrkiye and China.\",\n        \"originalIndex\": 57\n    },\n    {\n        \"category\": \"Fruit & Vegetables\",\n        \"name\": \"Pear Spain\",\n        \"mom\": -7,\n        \"yoy\": -4.1,\n        \"price\": \"\u20ac1,860/mt\",\n        \"proxy\": \"Spain\",\n        \"summary\": \"The average weekly price of Spanish Pear as of September 17 decreased by 7.0% M-O-M and by 4.1% Y-O-Y to \u20ac1,860/mt. According to the World Apple and Pear Association (WAPA), pear production in the EU is set to grow by 1.4% y-o-y in the 2025/26 marketing year, to 1.79 million tons, though this is still 2.5% below the three-year average. According to WAPA, crop yields are being negatively affected by the effects of climate change, biosecurity challenges, and an industry shift towards higher-quality but less productive varieties.\",\n        \"originalIndex\": 58\n    },\n    {\n        \"category\": \"Fruit & Vegetables\",\n        \"name\": \"Pear China\",\n        \"mom\": 2.3,\n        \"yoy\": 1.5,\n        \"price\": \"CNY 6,580/mt\",\n        \"proxy\": \"China\",\n        \"summary\": \"The average weekly price of Chinese Pear as of September 24 increased by 2.3% M-O-M and by 1.5% Y-O-Y to CNY 6,580/mt. While official production figures are yet to be published, Chinese pear production is broadly expected to decrease in 2025/26, according to WAPA, following a season of challenging weather events, including drought and hail.\",\n        \"originalIndex\": 59\n    },\n    {\n        \"category\": \"Fruit & Vegetables\",\n        \"name\": \"Pear Argentina\",\n        \"mom\": -3.9,\n        \"yoy\": 10.9,\n        \"price\": \"ARS 1,262.22/kg\",\n        \"proxy\": \"Argentina\",\n        \"summary\": \"The average weekly price of oods entering the US is in place.\",\n        \"originalIndex\": 70\n    },\n    {\n        \"category\": \"Juices\",\n        \"name\": \"Apple Juice EU\",\n        \"mom\": 0,\n        \"yoy\": -17.3,\n        \"price\": \"\u20ac2,150/mt\",\n        \"proxy\": \"EU\",\n        \"summary\": \"The average weekly price of EU Apple Juice as of September 24 was unchanged M-O-M and declined by 17.3% Y-O-Y to \u20ac2,150/mt. The outlook for EU production is mixed for two of the world's major producers. Whereas Poland's crop forecast is strong, T\u00fcrkiye is facing significant y-o-y losses. According to WAPA, the sector faces several uncertainties, including climate variability, labor shortages, rising costs, geopolitical instability, a volatile trade environment, and currency fluctuations.\",\n        \"originalIndex\": 71\n    },\n    {\n        \"category\": \"Softs\",\n        \"name\": \"Sugar ICE #11 New York\",\n        \"mom\": -5.7,\n        \"yoy\": -31.9,\n        \"price\": \"USc 15.48/lb\",\n        \"proxy\": \"New York\",\n        \"summary\": \"The average weekly spot price of ICE #11 Raw Sugar futures as of September 24 fell by 5.7% m-o-m and declined by 31.9% y-o-y to USc 15.48/lb. The average weekly price of spot ICE London #5 White Sugar futures as of September 24 fell 6.2% m-o-m and declined by 22.1% y-o-y to $456.56/mt. Strong results from CS Brazil (agricultural yields, sucrose concentration and exports) in August, talks of India domestic sugar exports in the coming season gaining momentum and some selling pressure prior to the ICE US NY No. 11 October contract expiry contributed to the downwards trend observed during the month.\",\n        \"originalIndex\": 72\n    },\n    {\n        \"category\": \"Softs\",\n        \"name\": \"Sugar ICE #5 London\",\n        \"mom\": -6.2,\n        \"yoy\": -22.1,\n        \"price\": \"\u00a3456.56/mt\",\n        \"proxy\": \"London\",\n        \"summary\": \"The average weekly spot price of ICE London #5 Whit ower in late September.\",\n        \"originalIndex\": 75\n    },\n    {\n        \"category\": \"Softs\",\n        \"name\": \"Arabica Coffee ICE New York\",\n        \"mom\": -5,\n        \"yoy\": 40,\n        \"price\": \"USc 367.52/lb\",\n        \"proxy\": \"New York\",\n        \"summary\": \"The average weekly spot price of ICE New York Arabica futures as of September 24 eased by 5.0% m-o-m but was up by 40.0% y-o-y to USc 367.52/lb. The highly volatile and choppy trading has been exacerbated by very weak certified stock levels and very short roaster coverage due both to high prices as well as the ongoing US trade war with Brazil, its key coffee supplier until now. Longer lead times, poor roaster coverage and high prices led to a lack of selling incentive on the part of growers and exporters, which has kept prices elevated during very tight market conditions.\",\n        \"originalIndex\": 76\n    },\n    {\n        \"category\": \"Softs\",\n        \"name\": \"Robusta Coffee ICE London\",\n        \"mom\": -8.8,\n        \"yoy\": -18.1,\n        \"price\": \"\u00a34,456/mt\",\n        \"proxy\": \"ICE London\",\n        \"summary\": \"The average weekly spot price of ICE London Robusta futures as of September 24 sank by 8.8% m-o-m and by 18.1% y-o-y to $4,456/mt. The weaker prices have been driven by continued bullish expectations for the coming Vietnamese crop and saw some m-o-m declines due to arabica prices as well. Fundamentally, the robusta market is well-supplied both from recent crops in Brazil as well as the coming improved crop in Vietnam and buying interest has remained weak as roasters look to buy only when they can.\",\n        \"originalIndex\": 77\n    },\n    {\n        \"category\": \"Herbs & Spices\",\n        \"name\": \"Black Pepper Vietnam\",\n        \"mom\": 6.1,\n        \"yoy\": -4.9,\n        \"price\": \"$6,750/mt\",\n        \"proxy\": \"Vietnam\",\n        \"summary\": \"The weekly Expana Benchmark Price (EBP) of Vietnamese Black ens[i].trim();\n                    // If the token contains a slash (/) or letters, it's probably the unit (e.g., GBP/MT)\n                    if (/[a-zA-Z\\/]/.test(token) && token.length > 1) {\n                         finalUnit = token;\n                         break;\n                    } \n                    // Fallback: use the full header text if separation fails\n                    if (i === 0) {\n                        finalUnit = unit;\n                    }\n                }\n\n                unit = finalUnit;\n\n            } else {\n                 // Fallback: Use the unit from the existing commodity data's current price string\n                 const selectedCommodity = document.getElementById('forecast-commodity-select').value;\n                 const commodityMatch = commodityData.find(d => d.name === selectedCommodity);\n                 if (commodityMatch && commodityMatch.price) {\n                     // Extract the unit part from the price string (e.g., \"\u00a34,955.20/mt\" -> \"/mt\")\n                     unit = commodityMatch.price.match(/([^\\d.,\\s]+.*)/)?.[1] || 'Price (N/A)';\n                     unit = unit.trim();\n                 }\n            }\n\n\n            for (let i = startIndex; i < lines.length; i++) {\n                const parts = lines[i].split(separator).map(s => s.trim());\n                if (parts.length >= 2) {\n                    const dateStr = parts[0];\n                    // Clean price: remove non-numeric chars except '.' and '-' (and skip thousands commas)\n                    let priceString = parts[1].replace(/[$,\u20ac\u00a3]/g, '').replace(/,/g, ''); \n                    let price = parseFloat(priceString); \n                    \n                    if (dateStr && !isNaN(price)) {\n                        parsedData.push({ date: dateStr, price: price });\n                    }\n                }\n            }\n            \n            return { data: parsedData, unit: unit }; // Return the ategory\n                        parts[1],   // Commodity Name\n                        parts[2],   // MoM %\n                        parts[3],   // YoY %\n                        parts[4],   // Price String\n                        ''          // Empty summary (we keep existing summaries by name, or use placeholder)\n                    );\n                    newCommodityData.push(item);\n                }\n            }\n            \n            return newCommodityData;\n        }\n        \n        // --- BULK DATA MODAL FUNCTIONS ---\n        \n        function showBulkDataModal() {\n            document.getElementById('bulk-data-modal').classList.remove('hidden');\n            document.getElementById('bulk-status').textContent = '';\n        }\n        \n        function hideBulkDataModal() {\n            document.getElementById('bulk-data-modal').classList.add('hidden');\n        }\n\n        function processBulkData() {\n            const rawText = document.getElementById('raw-bulk-data').value;\n            const statusElement = document.getElementById('bulk-status');\n\n            if (rawText.trim().length < 50) {\n                 statusElement.classList.add('text-secondary-red');\n                 statusElement.textContent = 'Please paste a complete data table (minimum 50 characters).';\n                 return;\n            }\n\n            try {\n                const newCommodityData = parseBulkData(rawText);\n                \n                if (newCommodityData.length > 5) { // Check for reasonable amount of data\n                    \n                    // Preserve existing commodity summaries (market commentary) and merge new data\n                    const oldSummaries = commodityData.reduce((acc, item) => {\n                        if (item.summary) acc[item.name] = item.summary;\n                        return acc;\n                    }, {});\n                    \n                    // Create the final data set by merging new and old dat
