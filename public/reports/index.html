  scales: {\n                        y: {\n                            title: { display: true, text: 'Index Value (2015=100)', color: '#e2e8f0' },\n                            ticks: { color: '#e2e8f0' },\n                            grid: { color: 'rgba(148, 163, 184, 0.1)' },\n                            beginAtZero: false,\n                            min: 143, // Adjusted for new data range\n                        },\n                        x: {\n                            ticks: { color: '#e2e8f0' },\n                            grid: { color: 'rgba(148, 163, 184, 0.1)' }\n                        }\n                    },\n                    plugins: { legend: { display: false } }\n                }\n            });\n        }\n\n        /**\n         * Renders the generic forecast chart using data from commodityForecasts.\n         * @param {string} commodityName - The key to look up in commodityForecasts.\n         */\n        function renderGenericForecastChart(commodityName) {\n            const ctx = document.getElementById('genericForecastChart').getContext('2d');\n            const forecastInfo = commodityForecasts[commodityName];\n            \n            if (!forecastInfo || forecastInfo.data.length === 0) {\n                 console.error(`No forecast data found for ${commodityName}`);\n                 return;\n            }\n\n            const dataSet = forecastInfo.data;\n            const dynamicUnit = forecastInfo.unit; // Dynamic unit from upload\n            const labels = dataSet.map(d => d.date);\n            const data = dataSet.map(d => d.price);\n            const colors = tailwind.config.theme.extend.colors;\n\n            if (genericForecastChartInstance) {\n                genericForecastChartInstance.destroy();\n            }\n\n            // --- Y-AXIS UNIT FIX ---\n            // 1. Identify the metric unit part (e.g., /mt, /kg)\n            let unitLabel = dynamicUnit.includes('/') ? dynamicUnit.split(' ').pop() : dynamicUnit;\n            // Clean unit label to remove unnecessary descriptors like (EBP) or (USc) \n            unitLabel = unitLabel.replace(/[\\(\\[].*?[\\)\\]]/g, '').trim(); \n            \n            // 2. Identify the currency symbol for the price labels, specifically checking for GBP\n            let currencySymbol = '';\n            if (dynamicUnit.includes('\u00a3') || dynamicUnit.includes('GBP')) currencySymbol = '\u00a3'; \n            else if (dynamicUnit.includes('$') || dynamicUnit.includes('USD')) currencySymbol = '$';\n            else if (dynamicUnit.includes('\u20ac') || dynamicUnit.includes('EUR')) currencySymbol = '\u20ac';\n            else if (dynamicUnit.includes('NOK')) currencySymbol = 'NOK ';\n            else if (dynamicUnit.includes('INR')) currencySymbol = '\u20b9';\n            // --- END Y-AXIS UNIT FIX ---\n\n\n            genericForecastChartInstance = new Chart(ctx, {\n                type: 'line',\n                data: {\n                    labels: labels,\n                    datasets: [{\n                        label: `${commodityName} Price Forecast (${dynamicUnit})`, // Use full dynamic unit in legend\n                        data: data,\n                        borderColor: colors['primary-blue'],\n                        backgroundColor: 'rgba(96, 165, 250, 0.1)',\n                        tension: 0.1,\n                        pointRadius: 1.5,\n                        pointBackgroundColor: colors['primary-blue'],\n                        pointHoverRadius: 5,\n                        fill: true,\n                    }]\n                },\n                options: {\n                    responsive: true,\n                    maintainAspectRatio: false,\n                    scales: {\n                        y: {\n                            // Only display the metric unit (e.g., /mt) on the title\n                            title: { display: true, text: unitLabel, color: '#e2e8f0' }, \n                            ticks: { \n                                color: '#e2e8f0', \n                                callback: function(value) { \n                                    // Prepend the detected currency symbol for the tick value\n                                    return `${currencySymbol}${value.toLocaleString()}`; \n                                } \n                            },\n                            grid: { color: 'rgba(148, 163, 184, 0.1)' },\n                            beginAtZero: false,\n                        },\n                        x: {\n                            ticks: {\n                                color: '#e2e8f0',\n                                autoSkip: false,\n                                maxRotation: 0,\n                                minRotation: 0,\n                                callback: function(value, index) {\n                                    // Logic to show label at the start of a month or first point\n                                    const dateStr = dataSet[index].date;\n                                    const dateParts = dateStr.split(/[\\/-]/);\n                                    let monthIndex = parseInt(dateParts[0], 10);\n                                    let day = parseInt(dateParts[1], 10);\n                                    let year = dateParts[2].slice(-2);\n                                    \n                                    if(dateParts[0].length === 4 && dateParts.length === 3) {\n                                        monthIndex = parseInt(dateParts[1], 10);\n                                        day = parseInt(dateParts[2], 10);\n                                        year = dateParts[0].slice(-2);\n                                    }\n                                    \n                                    if (index === 0 || day === 1) {\n                                         const monthAbbrev = new Date(0, monthIndex - 1, 1).toLocaleString('en-US', { month: 'short' });\n                                         return `${monthAbbrev}-${year}`; \n                                    }\n                                    return null;\n                                }\n                            },\n                            grid: { color: 'rgba(148, 163, 184, 0.1)' }\n                        }\n                    },\n                    plugins: {\n                        legend: { display: false },\n                        tooltip: {\n                            callbacks: {\n                                title: function(context) {\n                                    return context[0].label;\n                                },\n                                label: function(context) {\n                                    return ` Price: ${currencySymbol}${context.formattedValue} ${unitLabel}`; // Use metric unit in tooltip\n                                }\n                            }\n                        }\n                    }\n                }\n            });\n        }\n\n\n        // --- VIEW MANAGEMENT FUNCTIONS ---\n        \n        /**\n         * Checks if a commodity has forecast data.\n         * @param {string} commodityName\n         * @returns {boolean}\n         */\n        function hasForecast(commodityName) {\n            // Check if the property exists and has data points\n            return commodityForecasts.hasOwnProperty(commodityName) && \n                   commodityForecasts[commodityName].data && \n                   commodityForecasts[commodityName].data.length > 0;\n        }\n\n        // Renamed function to be generic and shareable\n        function showForecastChartModal(commodityName) {\n            const item = commodityData.find(d => d.name === commodityName);\n            if (!item || !hasForecast(commodityName)) return;\n\n            // 1. Set Modal Title and Subtitle\n            document.getElementById('forecast-modal-title').textContent = `${commodityName} Forward Curve`;\n            document.getElementById('forecast-modal-subtitle').textContent = `Forecasted price trend based on futures data.`;\n\n            // 2. Populate Commentary\n            document.getElementById('forecast-commentary').innerHTML = `\n                <p><strong>YoY Inflation (Spot):<\/strong> ${item.yoy.toFixed(1)}%<\/p>\n                <p class=\"mt-2\">${item.summary}<\/p>\n            `;\n            \n            // 3. Show Modal and Render Chart\n            document.getElementById('forecast-chart-modal').classList.remove('hidden');\n            setTimeout(() => renderGenericForecastChart(commodityName), 10);\n        }\n\n        // Updated function to call the generic modal\n        function showRobustaForecastModal() {\n            showForecastChartModal('Robusta Coffee ICE London');\n        }\n\n        function hideForecastModal() {\n            document.getElementById('forecast-chart-modal').classList.add('hidden');\n        }\n        \n        // --- DATA INPUT MODAL FUNCTIONS (SIMPLIFIED) ---\n        \n        function populateForecastSelect() {\n            const select = document.getElementById('forecast-commodity-select');\n            select.innerHTML = '<option value=\"\">--- Select Commodity ---<\/option>';\n            \n            // Get all unique commodity names from the data\n            const commodityNames = [...new Set(commodityData.map(d => d.name))].sort();\n            \n            commodityNames.forEach(name => {\n                const option = document.createElement('option');\n                option.value = name;\n                option.textContent = name;\n                select.appendChild(option);\n            });\n        }\n        \n        function showForecastInputModal() {\n            populateForecastSelect(); // Ensure select list is fresh\n            document.getElementById('forecast-input-modal').classList.remove('hidden');\n            document.getElementById('input-status').textContent = '';\n            document.getElementById('raw-forecast-data').value = '';\n        }\n        \n        function hideForecastInputModal() {\n            document.getElementById('forecast-input-modal').classList.add('hidden');\n        }\n\n        function processForecastInput() {\n            const commodityName = document.getElementById('forecast-commodity-select').value;\n            const rawText = document.getElementById('raw-forecast-data').value;\n            const statusElement = document.getElementById('input-status');\n\n            if (!commodityName) {\n                statusElement.classList.add('text-secondary-red');\n                statusElement.textContent = 'Please select a commodity first.';\n                return;\n            }\n            if (rawText.trim().length < 20) {\n                 statusElement.classList.add('text-secondary-red');\n                 statusElement.textContent = 'Please paste valid data (Date and Price columns).';\n                 return;\n            }\n\n            try {\n                // Correctly capture both data and unit from the parse function\n                const { data: parsedData, unit: extractedUnit } = parseCsvForecast(rawText);\n                \n                if (parsedData.length > 5) {\n                    // 1. Save the data and unit globally in the correct structure\n                    commodityForecasts[commodityName] = { \n                        data: parsedData,\n                        unit: extractedUnit\n                    };\n                    \n                    // 2. SAVE TO LOCAL STORAGE (for session persistence)\n                    saveForecastsToStorage();\n\n\n                    // 3. Update UI to show success\n                    statusElement.classList.remove('text-secondary-red');\n                    statusElement.classList.add('text-accent-green');\n                    statusElement.textContent = `Success! ${parsedData.length} data points loaded for ${commodityName} (Unit: ${extractedUnit}).`;\n                    \n                    // 4. Close modal and refresh list\n                    hideForecastInputModal(); \n                    renderCommodityList(currentSearchTerm, currentCategoryFilter);\n                } else {\n                    statusElement.classList.add('text-secondary-red');\n                    statusElement.textContent = `Error: Found only ${parsedData.length} valid data points. Check format (Date [Tab/Comma] Price).`;\n                }\n\n            } catch (e) {\n                 statusElement.classList.add('text-secondary-red');\n                 statusElement.textContent = `Processing failed: ${e.message}`;\n                 console.error(\"Forecast input error:\", e);\n            }\n        }\n\n\n        // --- CORE VIEW FUNCTIONS (Rest of the file) ---\n\n        function showListView(category) {\n            currentCategoryFilter = category;\n            document.getElementById('category-grid').classList.add('hidden');\n            document.getElementById('commodity-list-wrapper').classList.remove('hidden');\n\n            const backBtn = document.getElementById('back-to-categories-btn');\n            const localSearch = document.getElementById('commodity-search');\n\n            if (category) {\n                backBtn.classList.remove('hidden');\n                localSearch.classList.remove('hidden');\n                document.getElementById('global-search-input').value = '';\n            } else {\n                backBtn.classList.add('hidden');\n                localSearch.classList.add('hidden');\n            }\n        }\n\n        function showCategoryView() {\n            currentCategoryFilter = '';\n            currentSearchTerm = '';\n            document.getElementById('commodity-list-wrapper').classList.add('hidden');\n            document.getElementById('category-grid').classList.remove('hidden');\n            document.getElementById('global-search-input').value = '';\n            document.getElementById('commodity-search').value = '';\n            lucide.createIcons();\n        }\n\n        function showCommodityDetail(index) {\n            const item = commodityData.find(item => item.originalIndex === index); // Find by original index\n            if (!item) return;\n            \n            // REMOVED: Set global index for the Expander button to reference\n            // REMOVED: Clear previous expanded analysis before showing modal\n\n\n            // Use generic forecast modal if data is present\n            if (hasForecast(item.name)) {\n                 showForecastChartModal(item.name);\n                 return;\n            }\n            \n            const modal = document.getElementById('commodity-detail-modal');\n            document.getElementById('detail-modal-title').innerHTML = `${item.name} Market Commentary`;\n            document.getElementById('detail-modal-category').textContent = item.category;\n            document.getElementById('detail-modal-price').textContent = `${item.price}`;\n            document.getElementById('detail-modal-mom').innerHTML = getChangePill(item.mom);\n            document.getElementById('detail-modal-source').textContent = item.proxy;\n            document.getElementById('detail-modal-summary').innerHTML = item.summary\n                ? `<p>${item.summary}<\/p>`\n                : `<p class=\"text-dark-muted italic\">No specific market commentary available for ${item.name} in the current report.<\/p>`;\n\n            modal.classList.remove('hidden');\n        }\n\n        function hideCommodityDetail() {\n            document.getElementById('commodity-detail-modal').classList.add('hidden');\n        }\n\n        // --- SORTING FUNCTIONALITY ---\n\n        function sortCommodities(key) {\n            const currentTh = document.querySelector(`[data-sort-key=\"${key}\"]`);\n\n            // If clicking a new key, reset direction to asc\n            if (currentSortKey !== key) {\n                currentSortDirection = 'asc';\n                currentSortKey = key;\n            } else {\n                // Toggle direction\n                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';\n            }\n\n            // Update all sort icons\n            document.querySelectorAll('.sortable-th').forEach(th => {\n                const iconId = `sort-icon-${th.dataset.sortKey}`;\n                const iconElement = document.getElementById(iconId);\n                iconElement.innerHTML = '';\n            });\n\n            // Update icon for current TH\n            const iconId = `sort-icon-${key}`;\n            const iconElement = document.getElementById(iconId);\n            iconElement.innerHTML = currentSortDirection === 'asc'\n                ? iconTemplate('arrow-up', 'w-3 h-3 text-primary-blue')\n                : iconTemplate('arrow-down', 'w-3 h-3 text-primary-blue');\n\n            // Re-render the list with new sort parameters\n            renderCommodityList(currentSearchTerm, currentCategoryFilter);\n        }\n\n        // --- RENDERING FUNCTIONS ---\n\n        function getChangePill(value) {\n            const isIncrease = value > 0;\n            \n            // Use static Tailwind classes for consistency and compilation\n            const colorClass = isIncrease\n                ? `bg-soft-red-bg text-secondary-red border border-secondary-red/50`\n                : `bg-soft-green-bg text-accent-green border border-accent-green/50`;\n                \n            const sign = isIncrease ? '+' : '';\n            return `<span class=\"inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold ${colorClass} min-w-[70px] justify-center\">${sign}${value.toFixed(1)}%<\/span>`;\n        }\n\n        function renderCategoryCards() {\n            const container = document.getElementById('category-grid');\n            const categories = {};\n\n            // 1. Group commodities by category and find max/min YoY for display\n            commodityData.forEach(item => {\n                if (!categories[item.category]) {\n                    categories[item.category] = { count: 0, maxYoY: -Infinity, maxYoYItem: null, minYoY: Infinity, minYoYItem: null };\n                }\n                categories[item.category].count++;\n                if (item.yoy > categories[item.category].maxYoY) {\n                    categories[item.category].maxYoY = item.yoy;\n                    categories[item.category].maxYoYItem = item;\n                }\n                if (item.yoy < categories[item.category].minYoY) {\n                    categories[item.category].minYoY = item.yoy;\n                    categories[item.category].minYoYItem = item;\n                }\n            });\n\n            // 2. Generate the cards\n            const categoryCardsHtml = Object.keys(categories).map(category => {\n                const data = categories[category];\n                const maxYoYItem = data.maxYoYItem;\n                const minYoYItem = data.minYoYItem;\n                const icon = categoryIcons[category] || 'box';\n\n                let colorClass = 'border-primary-blue';\n                let alertText = '';\n                \n                const maxYoY = data.maxYoY;\n                const minYoY = data.minYoY;\n                const signMax = maxYoY >= 0 ? '+' : '';\n                const signMin = minYoY >= 0 ? '+' : '';\n\n\n                if (maxYoY > 50) {\n                    // HIGH RISK CALLOUT (Red)\n                    colorClass = 'border-secondary-red ring-secondary-red/50';\n                    alertText = `\n                        <p class=\"text-xs font-semibold mt-2 text-secondary-red\">\n                            Risk: ${maxYoYItem.name} <span class=\"font-extrabold\">${signMax}${maxYoY.toFixed(1)}% YoY<\/span>\n                        <\/p>\n                    `;\n                } else if (minYoY < -15) {\n                    // OPPORTUNITY CALLOUT (Green)\n                    colorClass = 'border-accent-green ring-accent-green/50';\n                    alertText = `\n                        <p class=\"text-xs font-semibold mt-2 text-accent-green\">\n                            Opportunity: ${minYoYItem.name} <span class=\"font-extrabold\">${signMin}${minYoY.toFixed(1)}% YoY<\/span>\n                        <\/p>\n                    `;\n                } else {\n                    // DEFAULT MAX VOLATILITY DISPLAY (Red if positive, Green if negative)\n                    const riskColor = maxYoY > 0 ? 'text-secondary-red' : 'text-accent-green';\n                    alertText = `\n                        <p class=\"text-xs text-dark-muted font-normal mt-2\">\n                            Max Volatility: <span class=\"${riskColor} font-extrabold\">${signMax}${maxYoY.toFixed(1)}% YoY<\/span>\n                        <\/p>\n                    `;\n                }\n\n                return `\n                    <div onclick=\"showListView('${category}'); renderCommodityList('', '${category}')\" class=\"card text-center transition duration-300 hover:shadow-3xl ring-2 ring-transparent hover:ring-2 ${colorClass} cursor-pointer\">\n                        <i data-lucide=\"${icon}\" class=\"w-8 h-8 text-primary-blue mx-auto mb-2\"><\/i>\n                        <p class=\"text-xl font-bold text-dark-text\">${category}<\/p>\n                        <p class=\"text-sm font-medium mt-1 text-gray-400\">${data.count} Commodities<\/p>\n                        ${alertText}\n                    <\/div>\n                `;\n            }).join('');\n\n            container.innerHTML = categoryCardsHtml;\n            lucide.createIcons();\n        }\n\n        function renderCommodityList(searchTerm = '', categoryFilter = '') {\n            const tbody = document.getElementById('commodity-list-body');\n            const displayNoteElement = document.getElementById('current-filter');\n            const lowerCaseSearch = searchTerm.toLowerCase().trim();\n\n            let dataToFilter = commodityData.map((item, index) => ({ ...item, originalIndex: index }));\n\n            // 1. Filter by Category\n            if (categoryFilter) {\n                dataToFilter = dataToFilter.filter(item => item.category === categoryFilter);\n            }\n\n            // 2. Filter by Search term\n            const filteredData = dataToFilter.filter(item =>\n                item.category.toLowerCase().includes(lowerCaseSearch) ||\n                item.name.toLowerCase().includes(lowerCaseSearch) ||\n                item.proxy.toLowerCase().includes(lowerCaseSearch)\n            );\n\n            // 3. Apply Sorting\n            if (currentSortKey) {\n                filteredData.sort((a, b) => {\n                    const valueA = a[currentSortKey];\n                    const valueB = b[currentSortKey];\n\n                    if (typeof valueA === 'number') {\n                        // Numeric sort\n                        return currentSortDirection === 'asc' ? valueA - valueB : valueB - valueA;\n                    } else {\n                        // String sort (case insensitive)\n                        const strA = String(valueA).toLowerCase();\n                        const strB = String(valueB).toLowerCase();\n                        if (strA < strB) return currentSortDirection === 'asc' ? -1 : 1;\n                        if (strA > strB) return currentSortDirection === 'asc' ? 1 : -1;\n                        return 0;\n                    }\n                });\n            }\n\n            // 4. Update search status text\n            if (lowerCaseSearch && !categoryFilter) {\n                displayNoteElement.textContent = `${filteredData.length} global results found for: \"${searchTerm}\"`;\n            } else if (lowerCaseSearch && categoryFilter) {\n                displayNoteElement.textContent = `${filteredData.length} results found in ${categoryFilter} for: \"${searchTerm}\"`;\n            } else if (categoryFilter) {\n                displayNoteElement.textContent = `Viewing all ${filteredData.length} commodities in: ${categoryFilter}`;\n            } else {\n                displayNoteElement.textContent = `Viewing all ${filteredData.length} commodities.`;\n            }\n\n            if (filteredData.length === 0) {\n                tbody.innerHTML = `\n                    <tr>\n                        <td colspan=\"5\" class=\"px-4 py-6 text-center text-dark-muted\">No commodities found matching your criteria.<\/td>\n                    <\/tr>\n                `;\n                return;\n            }\n\n            // 5. Render the list\n            tbody.innerHTML = filteredData.map(item => {\n                const hasForecastData = hasForecast(item.name);\n                \n                const clickAction = item.summary || hasForecastData\n                    ? hasForecastData ? `showForecastChartModal('${item.name}')` : `showCommodityDetail(${item.originalIndex})`\n                    : '';\n                    \n                const rowClass = hasForecastData\n                    ? 'border-l-4 border-l-accent-green/50 hover:border-l-accent-green' // Highlight forecast item\n                    : (item.summary ? 'border-l-4 border-l-primary-blue/0 hover:border-l-primary-blue' : '');\n                \n                const titleText = hasForecastData\n                    ? 'Click for Forward Curve Forecast (Includes Commentary)'\n                    : (item.summary ? 'Click for Market Commentary' : 'No commentary available');\n                \n                return `\n                    <tr\n                        class=\"hover:bg-dark-bg transition duration-150 cursor-pointer hover:shadow-lg ${rowClass}\"\n                        onclick=\"${clickAction}\"\n                        title=\"${titleText}\"\n                    >\n                        <td class=\"px-4 py-3 whitespace-nowrap text-sm font-semibold text-dark-muted\">\n                            ${item.category}\n                        <\/td>\n                        <td class=\"px-4 py-3 whitespace-nowrap text-sm font-semibold text-dark-text\">\n                            ${item.name}\n                            ${hasForecastData ? `<i data-lucide=\"line-chart\" class=\"w-4 h-4 ml-2 inline text-accent-green\"><\/i>` : ''}\n                        <\/td>\n                        <td class=\"px-4 py-3 whitespace-nowrap text-sm text-gray-300\">\n                            ${item.price}\n                            <div class=\"text-xs text-dark-muted mt-0.5\">(${item.proxy})<\/div>\n                        <\/td>\n                        <td class=\"px-4 py-3 whitespace-nowrap text-center text-sm\">\n                            ${getChangePill(item.mom)}\n                        <\/td>\n                        <td class=\"px-4 py-3 whitespace-nowrap text-center text-sm\">\n                            ${getChangePill(item.yoy)}\n                        <\/td>\n                    <\/tr>\n                `;\n            }).join('');\n            \n            lucide.createIcons(); // Re-render icons after updating tbody\n        }\n\n        function renderKPIs() {\n            const latestHICP = hicpData[hicpData.length - 1].index;\n            document.getElementById('kpi-hicp-index').textContent = latestHICP.toFixed(1);\n\n            const momElement = document.getElementById('kpi-mom-change');\n            momElement.textContent = `${generalMoM.toFixed(1)}%`;\n            momElement.classList.remove('text-accent-green', 'text-secondary-red', 'text-dark-text');\n            momElement.classList.add(generalMoM < 0 ? 'text-accent-green' : 'text-secondary-red');\n\n            const yoyElement = document.getElementById('kpi-yoy-change');\n            // The request is to ALWAYS make this red since it's positive.\n            yoyElement.textContent = `+${generalYoY.toFixed(1)}%`;\n            yoyElement.classList.remove('text-accent-green', 'text-secondary-red');\n            yoyElement.classList.add('text-secondary-red');\n\n            // --- KPI LOGIC UPDATE: HIGHEST MoM HIKE ---\n            const highestMoM = commodityData.reduce((max, item) => item.mom > max.mom ? item : max, { mom: -Infinity, category: 'N/A', name: 'N/A' });\n            const highestMoMElement = document.getElementById('kpi-highest-mom');\n            \n            if (highestMoM.mom !== -Infinity) {\n                // Ensure correct formatting and class is applied\n                highestMoMElement.innerHTML = `${highestMoM.name} <span class=\"font-extrabold text-2xl\">(+${highestMoM.mom.toFixed(1)}%)<\/span>`;\n                highestMoMElement.classList.remove('text-accent-green');\n                highestMoMElement.classList.add('text-secondary-red');\n            } else {\n                highestMoMElement.innerHTML = `No data found`;\n            }\n        }\n\n\n        function renderProcurementActions() {\n            const container = document.getElementById('procurement-actions-content');\n\n            const createList = (title, items, icon, color) => {\n                const iconColor = color.replace('text-', ''); // Get base color name\n                return `\n                    <div class=\"space-y-2\">\n                        <h3 class=\"text-xl font-bold ${color} flex items-center\">\n                            ${iconTemplate(icon, `w-5 h-5 mr-2 text-${iconColor}`)}\n                            ${title}\n                        <\/h3>\n                        <ul class=\"ml-2 space-y-2 text-sm text-gray-300\">\n                            ${items.map(item => `<li class=\"flex items-start\"><span class=\"mr-2 ${color} font-bold text-lg leading-none mt-[-2px]\">&bull;<\/span><span>${item}<\/span><\/li>`).join('')}\n                        <\/ul>\n                    <\/div>\n                `;\n            }\n\n            container.innerHTML = [\n                createList(\"High Risks\", procurementActions.risks, \"triangle-alert\", \"text-secondary-red\"),\n                createList(\"Strategic Opportunities\", procurementActions.opportunities, \"trending-up\", \"text-accent-green\"),\n                createList(\"Tactical Recommendations\", procurementActions.tactical, \"zap\", \"text-primary-blue\")\n            ].join('<hr class=\"my-6 border-gray-700\">');\n            lucide.createIcons();\n        }\n\n        function renderReferences() {\n            const list = document.getElementById('references-list');\n            list.innerHTML = references.map(ref => `\n                <li id=\"${ref.id}\" class=\"flex items-start\">\n                    <span class=\"mr-2 text-dark-muted\">${iconTemplate('link', 'w-4 h-4 text-primary-blue')}<\/span>\n                    <a href=\"${ref.uri}\" target=\"_blank\" class=\"text-gray-300 hover:text-primary-blue hover:underline\">\n                        ${ref.title}\n                    <\/a>\n                <\/li>\n            `).join('');\n            lucide.createIcons();\n        }\n\n        function setHICPChartSource() {\n            const ref = references.find(r => r.id === 'eurostat_hicp');\n            const sourceElement = document.getElementById('hicp-chart-source');\n            if (ref && sourceElement) {\n                // Ensure the source URL is used directly in the chart source attribution\n                sourceElement.innerHTML = `Source: <a href=\"${ref.uri}\" target=\"_blank\" class=\"text-primary-blue hover:underline\">${ref.title}<\/a>`;\n            }\n        }\n\n        function setupScrollAnimation(elementId) {\n            const element = document.getElementById(elementId);\n            if (!element) return;\n            const observer = new IntersectionObserver((entries, observer) => {\n                entries.forEach(entry => {\n                    if (entry.isIntersecting) {\n                        entry.target.classList.remove('chart-hidden');\n                        entry.target.classList.add('chart-visible');\n                        observer.unobserve(entry.target);\n                    }\n                });\n            }, {\n                rootMargin: '0px',\n                threshold: 0.1\n            });\n            observer.observe(element);\n        }\n\n        function initializeDashboard() {\n            // 1. Load any previously saved forecasts from browser storage (for session use)\n            loadForecastsFromStorage();\n\n            // 2. Attach original index to data items for stable lookup during modals\n            commodityData.forEach((item, index) => item.originalIndex = index);\n\n            // 3. Render all UI elements\n            renderKPIs();\n            renderHICPChart();\n            setHICPChartSource();\n            renderCategoryCards();\n            renderProcurementActions();\n            renderReferences();\n\n            // Initial render of the commodity list (unsorted, all items)\n            renderCommodityList('', '');\n\n            // Set up scroll animations for the main sections\n            setupScrollAnimation('kpi-grid');\n            setupScrollAnimation('hicp-chart-container');\n            setupScrollAnimation('summary-container');\n            setupScrollAnimation('commodity-view-container');\n            setupScrollAnimation('procurement-actions-card'); \n            setupScrollAnimation('references-container');\n        }\n\n        // --- NEW PERSISTENT SAVE FUNCTION ---\n        function generateShareableHTML() {\n            // Get the entire current HTML content as a string\n            const originalHTML = document.documentElement.outerHTML;\n            \n            // --- 1. Serialize live data ---\n            const forecastsJsonString = JSON.stringify(commodityForecasts, null, 4);\n            const commodityJsonString = JSON.stringify(commodityData, null, 4);\n            const hicpJsonString = JSON.stringify(hicpData, null, 4);\n            \n            // --- 2. Define markers ---\n            const markers = {\n                forecast: { start: '// START_PERSISTENT_FORECAST_DATA', end: '// END_PERSISTENT_FORECAST_DATA', data: `let commodityForecasts = ${forecastsJsonString};` },\n                commodity: { start: '// START_PERSISTENT_COMMODITY_DATA', end: '// END_PERSISTENT_COMMODITY_DATA', data: `let commodityData = ${commodityJsonString};` },\n                hicp: { start: '// START_PERSISTENT_HICP_DATA', end: '// END_PERSISTENT_HICP_DATA', data: `const hicpData = ${hicpJsonString};` }\n            };\n\n            let modifiedHTML = originalHTML;\n\n            // --- 3. Perform replacements for all three blocks ---\n            for (const key in markers) {\n                const { start, end, data } = markers[key];\n                \n                const startIndex = modifiedHTML.indexOf(start);\n                const endIndex = modifiedHTML.indexOf(end);\n                \n                if (startIndex !== -1 && endIndex !== -1 && startIndex < endIndex) {\n                    const segmentToReplace = modifiedHTML.substring(startIndex, endIndex + end.length);\n                    \n                    // The replacement format needs to include the line breaks and indentation of the original file structure\n                    const replacementString = `\\n        ${start}\\n        ${data}\\n        ${end}\\n    `;\n                    \n                    modifiedHTML = modifiedHTML.replace(segmentToReplace, replacementString);\n                } else {\n                    console.error(`Failed to find ${key} code markers for persistent injection.`);\n                }\n            }\n\n            // --- 4. Trigger Download ---\n            // Use 'text/html;charset=utf-8' to prevent issues with characters like \u00a3 and \u20ac\n            const blob = new Blob([modifiedHTML], { type: 'text/html;charset=utf-8' });\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = `EU_Outlook_v${APP_VERSION}_${new Date().toISOString().slice(0, 10)}.html`;\n            document.body.appendChild(a);\n            a.click();\n            document.body.removeChild(a);\n            URL.revokeObjectURL(url);\n            \n            // Inform user\n            alert(\"Shareable HTML file generated and downloaded! This file contains all your current commodity, HICP, and forecast data.\");\n        }\n    <\/script>\n\n\n<\/body><\/html>", "legacy": true}};
    const DEFAULT = "2026-04";

    function selectPeriod(slug) {
      const p = PERIODS[slug];
      if (!p) return;

      // Button state
      document.querySelectorAll('.period-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.slug === slug);
        b.setAttribute('aria-selected', b.dataset.slug === slug ? 'true' : 'false');
      });

      // Banner
      document.getElementById('v-title').textContent = p.title || 'Report';
      document.getElementById('v-period').textContent = p.period;
      let meta = '';
      if (p.region) meta += p.region;
      if (p.period_mom) meta += (meta ? ' · ' : '') + 'MoM: ' + p.period_mom;
      if (p.period_yoy) meta += (meta ? ' · ' : '') + 'YoY: ' + p.period_yoy;
      document.getElementById('v-meta').innerHTML = meta;
      document.getElementById('v-legacy').style.display = p.legacy ? '' : 'none';

      // Report frame & URL — srcdoc lets the nested HTML load under file://
      const frame = document.getElementById('report-frame');
      frame.srcdoc = p.srcdoc;
      document.title = 'Commodity Dashboard — ' + p.period;
      history.replaceState(null, '', '?period=' + slug);
    }

    const params = new URLSearchParams(window.location.search);
    const initial = params.get('period') && PERIODS[params.get('period')]
      ? params.get('period')
      : DEFAULT;
    selectPeriod(initial);
  </script>
